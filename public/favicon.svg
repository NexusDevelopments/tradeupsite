<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="TradeUp logo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2642;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2f7dff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  
  <!-- Glowing border -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="url(#border)" stroke-width="2.5" opacity="0.8"/>
  
  <!-- Inner glow effect -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#2f7dff" stroke-width="0.5" opacity="0.3"/>
  
  <!-- "T" Letter with modern design -->
  <g transform="translate(32, 32)">
    <!-- Top bar of T -->
    <rect x="-10" y="-14" width="20" height="5" rx="2" fill="#65b0ff"/>
    <!-- Vertical stem of T with gradient -->
    <rect x="-3.5" y="-9" width="7" height="22" rx="2" fill="url(#border)"/>
    <!-- Accent dot/pixel for modern touch -->
    <circle cx="9" cy="-11" r="2" fill="#4a9eff" opacity="0.8"/>
  </g>
  
  <!-- Bottom accent curve -->
  <path d="M 15 48 Q 32 52, 49 48" stroke="#2f7dff" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
</svg>
