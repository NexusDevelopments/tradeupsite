<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="TradeUp logo">
  <defs>
    <linearGradient id="crystalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4dd0e1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2196f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976d2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1929;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#051526;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" style="stop-color:#64b5f6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#1976d2;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bgGrad)" stroke="#1976d2" stroke-width="2"/>
  
  <!-- Glow effect -->
  <circle cx="100" cy="80" r="60" fill="url(#glow)" opacity="0.5"/>
  
  <!-- 3D Crystal/Diamond shape -->
  <g transform="translate(100, 70)">
    <!-- Top facet -->
    <polygon points="0,-35 -25,-10 0,0 25,-10" fill="#64b5f6" opacity="0.9"/>
    
    <!-- Left facet -->
    <polygon points="-25,-10 -30,10 0,0" fill="#42a5f5" opacity="0.85"/>
    
    <!-- Right facet -->
    <polygon points="25,-10 30,10 0,0" fill="#2196f3" opacity="0.9"/>
    
    <!-- Center facet -->
    <polygon points="0,0 -30,10 0,35 30,10" fill="url(#crystalGrad)"/>
    
    <!-- Left bottom facet -->
    <polygon points="-30,10 -15,25 0,35" fill="#1976d2" opacity="0.8"/>
    
    <!-- Right bottom facet -->
    <polygon points="30,10 15,25 0,35" fill="#1565c0" opacity="0.85"/>
    
    <!-- Highlights -->
    <polygon points="0,-35 -10,-15 0,-5 10,-15" fill="#e3f2fd" opacity="0.7"/>
    <polygon points="-5,5 5,5 0,20" fill="#bbdefb" opacity="0.5"/>
  </g>
  
  <!-- TRADE text -->
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="28" font-weight="900" 
        text-anchor="middle" fill="#64b5f6" letter-spacing="3">TRADE</text>
  
  <!-- UP text -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="28" font-weight="900" 
        text-anchor="middle" fill="#42a5f5" letter-spacing="3">UP</text>
  
  <!-- Shine/stars effect -->
  <circle cx="140" cy="40" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="60" cy="50" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="150" cy="70" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="45" cy="80" r="1.5" fill="#fff" opacity="0.5"/>
</svg>
